<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <title>Wilki & Owce – Gry</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/dark-theme.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
</head>
<body>

<header>
    <h1>🐺 Wilki &amp; Owce</h1>
    <span class="badge">LOBBY</span>
</header>

<main>
    <p class="section-title">Dostępne gry</p>

    <div class="game-list" th:if="${not #lists.isEmpty(games)}">
        <div class="game-card" th:each="game : ${games}">
            <div class="game-info">
                <span class="game-id" th:text="${game.gameId}">game-id</span>
                <div class="game-meta">
                    <span class="game-type" th:text="${game.gameRequest.gameType}">Typ</span>
                    <span class="game-time" th:text="${game.createTime}">2026-01-01 00:00</span>
                </div>
            </div>
            <a class="btn-join" th:href="@{/joinGame.html(gameId=${game.gameId})}">Dołącz</a>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(games)}">
        <div class="icon">🎲</div>
        <p>Brak aktywnych gier. Utwórz nową!</p>
    </div>
</main>

<footer>
    <a class="btn-create" href="/randomGame.html">
        <span>＋</span> Nowa losowa gra
    </a>
</footer>

</body>

<script>
    let loc = window.location;
    let wsStart = loc.protocol === 'https:' ? 'wss://' : 'ws://';
    let host = loc.host;

    const stompClient = new StompJs.Client({
        brokerURL: wsStart + host + '/socket'
    });

    stompClient.onConnect = () => {
        stompClient.subscribe('/topic/games-list-changed', () => {
            window.location.reload();
        });
    };

    stompClient.activate();
</script>
</html>
