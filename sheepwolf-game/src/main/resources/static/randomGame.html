<html lang="pl">
<head>
    <title>Wilki &amp; Owce – Gra</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/dark-theme.css"/>

    <link rel="stylesheet"
          href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
          integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU"
          crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
            integrity="sha384-ZvpUoO/+PpLXR1lu4jmpXWu80pZlYUAfxl5NsBMWOEPSjUn/6Z/hRTt8+pR6L4N2"
            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"
            integrity="sha384-8Vi8VHwn3vjQ9eUHUxex3JSN/NFqUg3QbPyX8kWyb93+8AC/pPWTzj+nHtbC5bxD"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="sheepwolf.js"></script>
    <script src="gameboard.js"></script>
    <script src="gamepanel.js"></script>

</head>

<body>

<header>
    <h1>🐺 Wilki &amp; Owce</h1>
    <span class="badge">GRA</span>
</header>

<main class="board-main">

    <div class="game-wrapper">
        <div id="board"></div>

        <div id="waiting-overlay">
            <div class="spinner"></div>
            <span class="waiting-text">Oczekiwanie na przeciwnika…</span>
            <span class="waiting-sub">Gra rozpocznie się automatycznie</span>
        </div>
    </div>

    <div class="game-link-box hidden" id="link-box">
        <span class="link-label">Zaproś przeciwnika:</span>
        <button class="btn-copy" id="btn-copy" onclick="copyGameLink()" title="Skopiuj link do gry">
            <span id="copy-icon">📋</span> Skopiuj link
        </button>
        <div id="game-qr"></div>
    </div>

</main>

<footer class="footer-start">
    <button class="btn-resign" id="btn-resign" onclick="gamePanel.resign()">
        <span>✕</span> Rezygnuj i wróć do lobby
    </button>
</footer>

<script>
    let loc = window.location;
    let wsStart = loc.protocol === 'https:' ? 'wss://' : 'ws://';
    let host = loc.host;

    const stompClient = new StompJs.Client({
        brokerURL: wsStart + host + '/socket'
    });

    const gameboard = new Gameboard('board', stompClient);
    const gamePanel = new GamePanel(gameboard, stompClient);

    gameboard.onGameStart = () => {
        document.getElementById('waiting-overlay').classList.add('hidden');
        document.getElementById('link-box').classList.add('hidden');
    };

    stompClient.onConnect = (frame) => {
        console.log('Connected: ' + frame);
        gameboard.init();

        stompClient.subscribe('/user/queue/game-created', (msg) => gameCreated(msg));

        stompClient.publish({
            destination: '/game/create',
            body: JSON.stringify({ gameType: 'ONLINE', metadata: {} })
        });
    };

    stompClient.activate();

    function copyGameLink() {
        const url = document.getElementById('btn-copy').dataset.url;
        navigator.clipboard.writeText(url).then(() => {
            const icon = document.getElementById('copy-icon');
            icon.textContent = '✅';
            setTimeout(() => { icon.textContent = '📋'; }, 2000);
        });
    }

    function gameCreated(msg) {
        const data = JSON.parse(msg.body);
        const joinUrl = loc.protocol + '//' + host + '/joinGame.html?gameId=' + data.gameId;
        document.getElementById('btn-copy').dataset.url = joinUrl;
        new QRCode(document.getElementById('game-qr'), {
            text: joinUrl,
            width: 180,
            height: 180,
            colorDark: '#e0e0e0',
            colorLight: '#1a1d2e'
        });
        document.getElementById('link-box').classList.remove('hidden');
    }
</script>
</body>
</html>
